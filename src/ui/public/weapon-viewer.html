<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AOF Weapon Viewer</title>
    <style>
      body {
        margin: 0;
        background: #100905;
        color: #ffe8b4;
        font-family: system-ui, sans-serif;
      }
      .shell {
        width: min(1400px, calc(100vw - 32px));
        margin: 16px auto;
      }
      header, .panel {
        border: 1px solid #a56a22;
        background: #1a0f08;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      a, button {
        border: 1px solid #a56a22;
        background: #2a160a;
        color: #ffe8b4;
        border-radius: 8px;
        padding: 8px 12px;
        text-decoration: none;
        cursor: pointer;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(520px, 1fr) 380px;
        gap: 16px;
      }
      .viewer-frame {
        position: relative;
        width: 100%;
        height: 72vh;
        min-height: 520px;
        border: 1px solid #a56a22;
        border-radius: 10px;
        background:
          linear-gradient(45deg, rgba(255,255,255,0.035) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255,255,255,0.035) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.035) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.035) 75%),
          #111;
        background-size: 32px 32px;
        background-position: 0 0, 0 16px, 16px -16px, -16px 0;
        overflow: hidden;
      }
      #viewerCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .viewer-overlay {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 8px 10px;
        border: 1px solid rgba(165, 106, 34, 0.7);
        background: rgba(0, 0, 0, 0.65);
        border-radius: 8px;
        font-size: 12px;
        color: #ffe8b4;
        max-width: calc(100% - 24px);
        pointer-events: none;
      }
      .controls {
        display: grid;
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
        color: #c89a62;
      }
      select {
        max-width: 100%;
      }
      pre {
        white-space: pre-wrap;
        background: #0b0603;
        border: 1px solid #a56a22;
        border-radius: 8px;
        padding: 10px;
        max-height: 320px;
        overflow: auto;
      }
      #capturePreview img {
        max-width: 100%;
        margin-top: 12px;
        border: 1px solid #a56a22;
        border-radius: 8px;
      }
      @media (max-width: 950px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  
    <script>
      if (new URLSearchParams(window.location.search).get("embedded") === "1") {
        document.documentElement.classList.add("embedded-viewer-mode");
      }
    </script>
    <style>
      .embedded-viewer-mode body {
        background: transparent;
      }
      .embedded-viewer-mode .shell {
        width: 100%;
        margin: 0;
      }
      .embedded-viewer-mode header {
        display: none;
      }
      .embedded-viewer-mode .layout {
        grid-template-columns: minmax(520px, 1fr) 380px;
        gap: 12px;
      }
      .embedded-viewer-mode .panel {
        margin-bottom: 0;
      }
      .embedded-viewer-mode .viewer-frame {
        height: 72vh;
        min-height: 520px;
      }
      @media (max-width: 950px) {
        .embedded-viewer-mode .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>

  </head>
  <body>
    <div class="shell">
      <header>
        <a href="/">Retour workflow</a>
        <h1>Weapon Viewer</h1>
        <p id="status">Loading...</p>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="viewer-frame">
            <canvas id="viewerCanvas"></canvas>
            <div id="viewerOverlay" class="viewer-overlay">No model loaded.</div>
          </div>
        </section>

        <aside class="panel controls">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="captureButton" type="button">Capture PNG</button>
          <button id="bakeSpriteButton" type="button">Bake Sprite to Package</button>

          <label>
            Model source
            <select id="modelSelect"></select>
          </label>

          <label>
            Auto rotate
            <input id="autoRotateInput" type="checkbox" checked />
          </label>

          <label>
            Exposure
            <input id="exposureInput" type="range" min="0.25" max="2.5" step="0.05" value="1" />
          </label>

          <label>
            Light intensity
            <input id="lightInput" type="range" min="0" max="6" step="0.1" value="2.5" />
          </label>

          <label>
            Camera distance multiplier
            <input id="distanceInput" type="range" min="0.5" max="4" step="0.05" value="1.35" />
          </label>

          <label>
            Model yaw
            <input id="modelYawInput" type="range" min="-180" max="180" step="1" value="0" />
          </label>

          <h2>weapon.json</h2>
          <pre id="weaponJson">No data.</pre>

          <div id="bakeResult"></div>
          <div id="capturePreview"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="./weapon-viewer.js?v=bake-sprite-v2"></script>
  </body>
</html>

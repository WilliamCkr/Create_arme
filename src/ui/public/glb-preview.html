<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GLB Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(45deg, rgba(255,255,255,.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.04) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.04) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.04) 75%),
        #101722;
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0px;
      font-family: Inter, system-ui, sans-serif;
      color: #eaf4ff;
    }

    #bar {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    #status {
      padding: 8px 10px;
      border: 1px solid rgba(135, 204, 255, 0.18);
      border-radius: 10px;
      background: rgba(5, 10, 18, 0.72);
      color: #cfe8ff;
      font-size: 12px;
      pointer-events: auto;
    }

    button {
      border: 1px solid rgba(135, 204, 255, 0.24);
      color: #eaf4ff;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      pointer-events: auto;
    }

    button:hover {
      background: rgba(125, 203, 255, 0.16);
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #gripInfo {
      padding: 8px 10px;
      border: 1px solid rgba(90, 255, 180, 0.22);
      border-radius: 10px;
      background: rgba(5, 22, 15, 0.72);
      color: #bfffe1;
      font-size: 12px;
      pointer-events: auto;
      max-width: 520px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #grip.on {
      border-color: rgba(95, 255, 175, 0.65);
      background: rgba(30, 180, 110, 0.22);
      color: #dfffea;
    }

    #saveGrip {
      border-color: rgba(255, 220, 120, 0.34);
    }

    #error {
      position: absolute;
      left: 20px;
      bottom: 20px;
      right: 20px;
      display: none;
      padding: 14px;
      border: 1px solid rgba(255, 120, 120, .35);
      border-radius: 12px;
      background: rgba(40, 5, 8, .75);
      color: #ffb4b4;
      font-weight: 700;
      white-space: pre-wrap;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="bar">
    <div id="status">Loading GLB...</div>
    <button id="reset">Reset View</button>
    <button id="fit">Fit Model</button>
    <button id="auto">Auto Rotate: Off</button>
    <button id="grip" title="Click, then click on the weapon to place the grip joint">Place Grip: Off</button>
    <button id="saveGrip" title="Save grip joint into the UI config">Save Grip</button>
    <div id="gripInfo">Grip joint: hidden</div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="error"></div>
  <script type="module" src="/glb-preview.js?v=place-grip-button-v1"></script>
</body>
</html>
